<!DOCTYPE html>
<html><head><style>
html { background: #0a1628; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; background: #0a1628; display: flex; flex-direction: column; }
.header { padding: 28pt 40pt 0 40pt; display: flex; align-items: center; }
.header .num { color: #00d4aa; font-size: 40pt; font-weight: bold; margin-right: 16pt; }
.header h1 { color: #ffffff; font-size: 24pt; margin: 0; }
.main { flex: 1; padding: 16pt 40pt; display: flex; gap: 16pt; }
.card { flex: 1; background: rgba(255,255,255,0.06); border-radius: 8pt; padding: 18pt; border-left: 4pt solid #00d4aa; }
.card h3 { color: #00d4aa; font-size: 14pt; margin: 0 0 8pt 0; }
.card p { color: #b0bec5; font-size: 10pt; margin: 4pt 0; line-height: 1.5; }
</style></head>
<body>
<div class="header"><p class="num">01</p><h1>研究背景及意义</h1></div>
<div class="main">
<div class="card"><h3>痛点分析</h3><p>学生平均花费 3-5 小时在格式调整上</p><p>不同期刊/学位论文格式要求各异</p><p>手动排版费时费力且易出错</p></div>
<div class="card" style="border-left-color: #5b8def;"><h3>技术机遇</h3><p>大语言模型(LLM)自然语言理解能力</p><p>准确识别语义边界和结构层次</p><p>python-docx 实现全自动化排版</p></div>
<div class="card" style="border-left-color: #f0c040;"><h3>项目意义</h3><p>降低论文排版门槛</p><p>多模板适配不同场景</p><p>构建论文写作全流程智能辅助</p></div>
</div>
</body></html>
